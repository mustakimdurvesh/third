<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Third</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link href="https://unpkg.com/maplibre-gl@4.1.0/dist/maplibre-gl.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="app">
    <div id="header">
      <h1>Third</h1>
      <div class="header-actions">
        <div id="userMenu" class="user-menu hidden">
          <button id="userMenuToggle" class="user-menu-toggle" type="button" aria-expanded="false">
            <span id="userLabel" class="subtitle"></span>
          </button>
          <div id="savedPlacesDropdown" class="saved-dropdown hidden">
            <div class="saved-dropdown-header">Saved places</div>
            <div id="savedPlacesContent" class="saved-dropdown-content"></div>
          </div>
        </div>
        <button id="authBtn" type="button">Sign in</button>
      </div>
    </div>
    <div id="refreshLoader" class="refresh-loader hidden">Refreshing...</div>

    <div id="authPanel" class="hidden">
      <input type="email" id="emailInput" placeholder="Email">
      <input type="password" id="passwordInput" placeholder="Password">
      <div class="auth-buttons">
        <button id="signInBtn" type="button">Sign in</button>
        <button id="signUpBtn" type="button" class="secondary">Sign up</button>
      </div>
      <p id="authError" class="auth-error hidden"></p>
      <button id="forgotBtn" type="button" class="forgot-link">Forgot password?</button>
    </div>

    <div id="map"></div>

    <div id="panel">
      <div id="situationForm">
        <div class="question">
          <p class="question-label">Who</p>
          <div class="chips" data-group="who">
            <button class="chip active" data-value="Solo">Solo</button>
            <button class="chip" data-value="With someone">With someone</button>
            <button class="chip" data-value="Small group">Small group</button>
          </div>
        </div>

        <div class="question">
          <p class="question-label">Need</p>
          <div class="chips" data-group="need">
            <button class="chip active" data-value="Coffee and work">Coffee &amp; work</button>
            <button class="chip" data-value="Drinks and chat">Drinks &amp; chat</button>
            <button class="chip" data-value="Food and hangout">Food &amp; hangout</button>
            <button class="chip" data-value="Just chill">Just chill</button>
          </div>
        </div>

        <div class="question">
          <p class="question-label">Time</p>
          <div class="chips" data-group="time">
            <button class="chip" data-value="Quick 30 minutes">Quick</button>
            <button class="chip active" data-value="A while 1 to 2 hours">A while</button>
            <button class="chip" data-value="Leisurely 2 plus hours">Leisurely</button>
          </div>
        </div>

        <div class="question">
          <p class="question-label">Energy</p>
          <div class="chips" data-group="energy">
            <button class="chip active" data-value="No preference">Any</button>
            <button class="chip" data-value="Quiet">Quiet</button>
            <button class="chip" data-value="Lively">Lively</button>
            <button class="chip" data-value="Outdoor seating preferred">Outdoor</button>
          </div>
        </div>

        <button id="findBtn" type="button" onclick="window.handleFindPlace && window.handleFindPlace()">Find my place</button>
      </div>

      <div id="results" class="hidden"></div>
      <button id="surpriseBtn" class="hidden">Take me somewhere different -&gt;</button>
      <div id="skeleton" class="hidden">
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/maplibre-gl@4.1.0/dist/maplibre-gl.js"></script>
  <script type="module" src="script.js"></script>
</body>

</html>
